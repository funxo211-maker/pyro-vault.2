<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyro | Local Research OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --primary: #00ff88; --bg-dark: #020302; }
        .dark { background-color: var(--bg-dark); color: #f8fafc; }
        .light { background-color: #f0f4f0; color: #0f172a; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s; min-height: 100vh; overflow-x: hidden; }

        .bg-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20vw; font-weight: 900; letter-spacing: -0.06em;
            pointer-events: none; z-index: 0; text-transform: uppercase;
            background: linear-gradient(180deg, #00ff88 0%, #00e0ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: neural-pulse 10s ease-in-out infinite;
        }
        @keyframes neural-pulse {
            0%, 100% { opacity: 0.05; filter: blur(10px); transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.12; filter: blur(5px); transform: translate(-50%, -50%) scale(1.05); }
        }

        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .light .glass-panel { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); }

        .project-card { transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .project-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px -20px rgba(0, 255, 136, 0.3); }

        .archive-item { cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 8px; font-size: 11px; color: #94a3b8; }
        .archive-item:hover { background: rgba(0, 255, 136, 0.1); color: var(--primary); border-left: 3px solid var(--primary); }
        
        .status-active { color: #00e0ff; background: rgba(0, 224, 255, 0.1); border: 1px solid rgba(0, 224, 255, 0.2); }
        .status-pending { color: #ffb800; background: rgba(255, 184, 0, 0.1); border: 1px solid rgba(255, 184, 0, 0.2); }
        .status-completed { color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
    </style>
</head>
<body class="dark">

    <div class="bg-watermark">PYRO</div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[999] opacity-0 pointer-events-none transition-all duration-500"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-96 glass-panel -translate-x-full transition-transform duration-500 z-[1000] flex flex-col">
        <div class="p-8 border-b border-white/5 bg-white/5">
            <div class="flex items-center justify-between">
                <h2 class="font-black text-2xl text-[#00ff88]">RESEARCH_CORE</h2>
                <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white">&times;</button>
            </div>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-6">
            <section>
                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-4 border-b border-emerald-500/20 pb-2">Genetic Templates</p>
                <div class="grid grid-cols-1 gap-1">
                    <div class="archive-item" onclick="quickLoad('Neural Mycelium', 'Interfacing gray matter with planetary fungal networks.')">Mycelium Brain Link</div>
                    <div class="archive-item" onclick="quickLoad('Chlorophyll Dermis', 'Photosynthetic skin grafting for solar energy.')">Photosynthetic Skin</div>
                    <div class="archive-item" onclick="quickLoad('Telomere Scrub', 'Nanobots engineered to freeze biological age.')">Age Stasis Protocol</div>
                </div>
            </section>
            <section>
                <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest mb-4 border-b border-cyan-400/20 pb-2">Quantum Templates</p>
                <div class="grid grid-cols-1 gap-1">
                    <div class="archive-item" onclick="quickLoad('Tachyon Scan', 'Receiving data from 5 minutes in the future.')">Pre-Event Visualizer</div>
                    <div class="archive-item" onclick="quickLoad('Gravity Anchor', 'Bending space-time for artificial 1G.')">Spatial Anchor</div>
                </div>
            </section>
        </div>
        <div class="p-8 border-t border-white/5">
            <h4 id="sideCount" class="text-4xl font-black text-[#00ff88]">0</h4>
            <p class="text-[8px] text-slate-500 uppercase mt-1">Modules in Local Storage</p>
        </div>
    </aside>

    <nav class="sticky top-0 z-50 p-6">
        <div class="max-w-7xl mx-auto glass-panel rounded-3xl p-4 px-8 flex items-center justify-between shadow-2xl">
            <button onclick="toggleSidebar()" class="group space-y-2">
                <div class="w-8 h-0.5 bg-[#00ff88] transition-all group-hover:w-10 shadow-[0_0_10px_#00ff88]"></div>
                <div class="w-10 h-0.5 bg-slate-500"></div>
            </button>
            <h1 class="text-2xl font-black text-[#00ff88] italic">PYRO OS</h1>
            <div class="flex items-center gap-6">
                <p id="clock" class="text-xl font-black text-white font-mono hidden md:block">00:00:00</p>
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-xl">☀️</button>
                <button onclick="toggleModal(true)" class="bg-[#00ff88] text-black px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-lg hover:scale-105 transition-all">Initialize</button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto p-8 pt-16">
        <h2 class="text-8xl font-black tracking-tighter mb-20 leading-[0.8]">The<br>Registry.</h2>
        <div id="projectContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 pb-32"></div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[2000]">
        <div class="glass-panel w-full max-w-2xl p-12 rounded-[3rem] border-white/10">
            <h2 class="text-3xl font-black text-white mb-8 italic">New Registry Entry</h2>
            <div class="space-y-6">
                <input id="projTitle" type="text" placeholder="Module Identifier" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-[#00ff88] text-white font-bold">
                <div id="statusPicker" class="grid grid-cols-3 gap-4">
                    <button onclick="setStatus('Active', this)" class="p-4 rounded-2xl border border-[#00ff88] text-[10px] font-black uppercase bg-[#00ff88]/10 text-[#00ff88]">Active</button>
                    <button onclick="setStatus('Pending', this)" class="p-4 rounded-2xl border border-white/5 text-[10px] font-black uppercase">Pending</button>
                    <button onclick="setStatus('Completed', this)" class="p-4 rounded-2xl border border-white/5 text-[10px] font-black uppercase">Secured</button>
                </div>
                <textarea id="projSolution" placeholder="System strings..." rows="5" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-mono text-xs text-[#00ff88] outline-none"></textarea>
            </div>
            <div class="mt-12 flex gap-4">
                <button onclick="toggleModal(false)" class="flex-1 text-slate-500 font-black py-6 uppercase text-xs">Abort</button>
                <button onclick="saveProject()" class="flex-[2] bg-[#00ff88] text-black font-black py-6 rounded-3xl uppercase tracking-widest shadow-2xl hover:scale-[1.02] transition-all">Save to Folder</button>
            </div>
        </div>
    </div>

    <script>
        // --- LOCAL PERMANENT STORAGE SYSTEM ---
        let projects = JSON.parse(localStorage.getItem('pyro_registry')) || [];
        let selectedStatus = 'Active';

        // Initialize and Render on load
        window.onload = () => { render(); updateClock(); };

        function saveProject() {
            const title = document.getElementById('projTitle').value;
            const solution = document.getElementById('projSolution').value;
            if(title && solution) {
                const newModule = {
                    id: Date.now().toString(),
                    title,
                    solution,
                    status: selectedStatus,
                    date: new Date().getTime()
                };
                projects.unshift(newModule); // Add to start of array
                localStorage.setItem('pyro_registry', JSON.stringify(projects)); // PERMANENT SAVE
                render();
                toggleModal(false);
                document.getElementById('projTitle').value = ''; 
                document.getElementById('projSolution').value = '';
            }
        }

        function render() {
            const container = document.getElementById('projectContainer');
            document.getElementById('sideCount').innerText = projects.length;
            
            if(projects.length === 0) {
                container.innerHTML = `<p class="col-span-3 text-center py-20 text-slate-700 italic">No modules detected in local directory.</p>`;
                return;
            }

            container.innerHTML = projects.map(p => `
                <div class="project-card glass-panel p-10 rounded-[2.5rem] flex flex-col h-full group relative overflow-hidden">
                    <button onclick="deleteItem('${p.id}')" class="absolute top-8 right-8 opacity-0 group-hover:opacity-100 text-red-500 font-black transition-all">&times;</button>
                    <div class="flex flex-col gap-4 mb-8">
                        <span class="text-[9px] font-black px-3 py-1 rounded-full status-${p.status.toLowerCase()} w-max uppercase tracking-widest">● ${p.status}</span>
                        <h3 class="text-3xl font-black tracking-tighter uppercase text-white">${p.title}</h3>
                    </div>
                    <div class="bg-black/50 border border-emerald-500/10 p-6 rounded-3xl font-mono text-[11px] leading-relaxed text-slate-400 flex-grow mb-6">
                        <span class="text-[#00ff88]">LOC_OUT>></span> ${p.solution}
                    </div>
                    <p class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Saved to Local Dir: ${new Date(p.date).toLocaleDateString()}</p>
                </div>`).join('');
        }

        function deleteItem(id) {
            if(confirm("Wipe this module from disk?")) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('pyro_registry', JSON.stringify(projects));
                render();
            }
        }

        // --- UI HELPERS ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('opacity-0');
            document.getElementById('sidebarOverlay').classList.toggle('pointer-events-none');
        }
        function toggleModal(s) { document.getElementById('addModal').classList.toggle('hidden', !s); }
        function toggleTheme() { document.body.classList.toggle('dark'); document.body.classList.toggle('light'); }
        function setStatus(s, btn) {
            selectedStatus = s;
            document.querySelectorAll('#statusPicker button').forEach(b => b.className = 'p-4 rounded-2xl border border-white/5 text-[10px] font-black uppercase');
            btn.className = 'p-4 rounded-2xl border border-[#00ff88] text-[10px] font-black uppercase bg-[#00ff88]/10 text-[#00ff88]';
        }
        function quickLoad(t, s) { document.getElementById('projTitle').value = t; document.getElementById('projSolution').value = s; toggleSidebar(); toggleModal(true); }
        function updateClock() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000); }
    </script>
</body>
</html>
