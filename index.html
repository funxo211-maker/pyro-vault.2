<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyro | Zero Trace Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020302; color: #e5e5e5; font-family: 'Inter', sans-serif; position: relative; overflow-x: hidden; }
        .pyro-card { background: rgba(10, 18, 10, 0.95); transition: all 0.4s ease; backdrop-filter: blur(15px); border: 1px solid #1a2e1a; }
        .pyro-card:hover { border-color: #10b981; transform: scale(1.02); }
        .solution-box { background-color: #000; border: 1px solid #064e3b; position: relative; }
        .locked-overlay { background: rgba(0,0,0,0.98); position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 0.75rem; }
        .pyro-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 35vw; font-weight: 900; color: rgba(16, 185, 129, 0.08);
            text-transform: uppercase; pointer-events: none; z-index: 0; white-space: nowrap;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="pyro-watermark">PYRO</div>

    <nav class="relative border-b border-emerald-900/40 p-6 flex flex-wrap justify-between items-center bg-black/95 sticky top-0 z-50 backdrop-blur-md">
        <div>
            <h1 class="text-4xl font-black tracking-tighter text-emerald-500 italic leading-none">PYRO</h1>
            <p id="stats" class="text-[10px] tracking-[0.3em] text-emerald-800 font-bold mt-1">PROTOCOL: CLOUD SECURE</p>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchInput" placeholder="Filter..." class="bg-zinc-900 border border-emerald-900/50 px-4 py-2 rounded-lg text-sm outline-none w-32 sm:w-48 focus:border-emerald-500 text-white">
            <button id="exportBtn" class="text-emerald-500 text-sm font-bold px-3">PDF</button>
            <button onclick="toggleModal(true)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg animate-pulse hover:animate-none">
                START PROJECT
            </button>
        </div>
    </nav>

    <main class="relative p-6 max-w-7xl mx-auto z-10">
        <div id="projectContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <button id="destructBtn" class="fixed bottom-6 right-6 z-50 bg-red-950/20 hover:bg-red-600 text-red-900 hover:text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border border-red-900/50">
        Self Destruct
    </button>

    <div id="addModal" class="hidden fixed inset-0 bg-black/98 flex items-center justify-center p-4 z-[100]">
        <div class="bg-zinc-900 w-full max-w-2xl p-8 rounded-3xl border border-emerald-600/30">
            <h2 class="text-2xl font-bold text-white mb-6 uppercase tracking-tight">Initialize Registry</h2>
            <div class="grid gap-4">
                <input id="projTitle" type="text" placeholder="Title" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none">
                <div class="flex gap-4">
                    <select id="projTag" class="flex-grow bg-black border border-zinc-800 p-4 rounded-xl text-emerald-500 outline-none">
                        <option value="Source Code">Source Code</option>
                        <option value="Logic">Logic</option>
                        <option value="Design">Design</option>
                    </select>
                    <div class="flex items-center gap-2 bg-black border border-zinc-800 px-4 rounded-xl">
                        <input type="checkbox" id="projLocked" class="accent-emerald-500">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold">Lock</label>
                    </div>
                </div>
                <textarea id="projSolution" placeholder="Solution data..." rows="8" class="w-full bg-black border border-zinc-800 p-4 rounded-xl font-mono text-emerald-400 outline-none"></textarea>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="window.saveProject()" class="flex-1 bg-emerald-600 p-4 rounded-xl font-bold text-white uppercase italic">Burn to Vault</button>
                <button onclick="toggleModal(false)" class="px-6 text-zinc-500 font-bold uppercase text-xs">Abort</button>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Firebase Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 2. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY",
            authDomain: "PASTE_YOUR_AUTH_DOMAIN",
            projectId: "PASTE_YOUR_PROJECT_ID",
            storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
            messagingSenderId: "PASTE_YOUR_SENDER_ID",
            appId: "PASTE_YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const projectsRef = collection(db, "projects");
        let masterKey = localStorage.getItem('pyro_master_v3') || null;

        // 3. UI Functions
        window.toggleModal = (show) => {
            document.getElementById('addModal').classList.toggle('hidden', !show);
        };

        // 4. Load from Cloud
        const q = query(projectsRef, orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const projects = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('stats').innerText = `${projects.length} RECORDS SYNCED`;
            render(projects);
        });

        function render(data) {
            const container = document.getElementById('projectContainer');
            container.innerHTML = data.map((p, index) => `
                <div class="pyro-card p-6 rounded-2xl flex flex-col h-full border-emerald-900/30">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[9px] px-2 py-0.5 rounded border border-emerald-900 text-emerald-500 font-black uppercase mb-1 inline-block">${p.tag}</span>
                            <h3 class="text-xl font-bold text-white">${p.title}</h3>
                        </div>
                        <button onclick="window.deleteItem('${p.id}')" class="text-zinc-800 hover:text-red-500 text-xs font-bold">DELETE</button>
                    </div>
                    <div class="solution-box p-4 rounded-xl text-zinc-300 font-mono text-xs overflow-auto h-48 whitespace-pre-wrap flex-grow">
                        ${p.locked ? `<div class="locked-overlay" id="lock-${p.id}"><button onclick="window.unlockProject('${p.id}')" class="text-emerald-500 text-[10px] font-bold uppercase border border-emerald-900/50 px-4 py-2 rounded-lg hover:bg-emerald-500 hover:text-black transition">Unlock</button></div>` : ''}
                        ${p.solution}
                    </div>
                </div>
            `).join('');
        }

        // 5. Cloud Actions
        window.saveProject = async () => {
            const title = document.getElementById('projTitle').value;
            const solution = document.getElementById('projSolution').value;
            const tag = document.getElementById('projTag').value;
            const locked = document.getElementById('projLocked').checked;

            if(title && solution) {
                if(locked && !masterKey) {
                    masterKey = prompt("Set Master Key for Encryption:");
                    if(!masterKey) return;
                    localStorage.setItem('pyro_master_v3', masterKey);
                }
                await addDoc(projectsRef, { title, solution, tag, locked, date: new Date().getTime() });
                window.toggleModal(false);
                document.getElementById('projTitle').value = '';
                document.getElementById('projSolution').value = '';
            }
        };

        window.deleteItem = async (id) => {
            if(confirm("Burn this record from the cloud?")) {
                await deleteDoc(doc(db, "projects", id));
            }
        };

        window.unlockProject = (id) => {
            if(prompt("Enter Master Key:") === masterKey) {
                document.getElementById(`lock-${id}`).remove();
            } else {
                alert("DENIED");
            }
        };

        // 6. Extras
        document.getElementById('exportBtn').onclick = () => {
            const el = document.createElement('div');
            el.innerHTML = `<h1>PYRO CLOUD EXPORT</h1>` + document.getElementById('projectContainer').innerText;
            html2pdf().from(el).set({ filename: 'Pyro-Vault-Dump.pdf' }).save();
        };

        document.getElementById('destructBtn').onclick = () => {
             alert("Cloud deletion requires manual Firebase cleanup for safety.");
        };

    </script>
</body>
</html>
