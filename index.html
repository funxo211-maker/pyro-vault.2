<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyro | System OS (UI Test)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --primary: #00ff88; --bg-dark: #030403; --bg-light: #fcfcfc; }
        .dark { background-color: var(--bg-dark); color: #f8fafc; }
        .light { background-color: var(--bg-light); color: #0f172a; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s; min-height: 100vh; }

        .bg-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22vw; font-weight: 900; letter-spacing: -0.06em;
            pointer-events: none; z-index: 0; text-transform: uppercase;
            background: linear-gradient(180deg, #00ff88 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.3));
            animation: pulse-glow 8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.05); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        .light .glass-panel { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(16, 185, 129, 0.2); }

        .project-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .status-active { color: #00e0ff; background: rgba(0, 224, 255, 0.1); border: 1px solid rgba(0, 224, 255, 0.2); }
        .status-pending { color: #ffb800; background: rgba(255, 184, 0, 0.1); border: 1px solid rgba(255, 184, 0, 0.2); }
        .status-completed { color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 10px; }
        
        .archive-item { cursor: pointer; transition: all 0.2s; border-left: 2px solid transparent; margin-bottom: 8px; }
        .archive-item:hover { border-left: 2px solid #00ff88; padding-left: 8px; color: #00ff88; }
    </style>
</head>
<body class="dark overflow-x-hidden">

    <div class="bg-watermark">PYRO</div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] opacity-0 pointer-events-none transition-opacity"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 glass-panel -translate-x-full transition-transform duration-500 z-[1000] flex flex-col">
        <div class="p-8 border-b border-white/10">
            <h2 class="font-bold text-xl text-[#00ff88]">ARCHIVE_v4.0</h2>
            <button onclick="toggleSidebar()" class="absolute top-8 right-8 text-slate-500 hover:text-white">&times;</button>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-8">
            <div>
                <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-4">Genetic & Biological</p>
                <div class="space-y-2 text-xs text-slate-400">
                    <div class="archive-item" onclick="quickLoad('Neuro-Synapse', 'Mapping consciousness to mycelium.')">Mycelium Link</div>
                    <div class="archive-item" onclick="quickLoad('Photosyn-Skin', 'Grafting chlorophyll cells.')">Green Skin Mod</div>
                    <div class="archive-item" onclick="quickLoad('Abyssal Gills', 'Bronchial oxygen filtration.')">Sea-Lung V2</div>
                </div>
            </div>
            </div>
    </aside>

    <nav class="sticky top-0 z-50 p-6">
        <div class="max-w-7xl mx-auto glass-panel rounded-2xl p-4 px-8 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <button onclick="toggleSidebar()" class="group space-y-1.5 p-2">
                    <div class="w-6 h-0.5 bg-[#00ff88]"></div>
                    <div class="w-8 h-0.5 bg-slate-400"></div>
                </button>
                <h1 class="text-2xl font-black text-[#00ff88]">PYRO</h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="toggleTheme()" id="theme-btn" class="p-2">☀️</button>
                <button onclick="toggleModal(true)" class="bg-[#00ff88] text-black px-6 py-2 rounded-xl font-bold text-xs uppercase shadow-lg">Initialize</button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto p-8">
        <header class="mb-16 flex justify-between items-end">
            <div>
                <h2 class="text-6xl font-black tracking-tighter">Workspace.</h2>
            </div>
            <p id="clock" class="text-4xl font-black text-emerald-500 font-mono">00:00:00</p>
        </header>
        <div id="projectContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 z-[2000]">
        <div class="glass-panel w-full max-w-xl p-10 rounded-[2.5rem]">
            <h2 class="text-3xl font-black mb-8 text-white">New Entry</h2>
            <div class="space-y-6">
                <input id="projTitle" type="text" placeholder="Entry ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-white">
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setStatus('Active', this)" class="status-choice p-3 rounded-xl border border-[#00ff88] text-[10px] font-black uppercase">Active</button>
                    <button onclick="setStatus('Pending', this)" class="status-choice p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase">Pending</button>
                    <button onclick="setStatus('Completed', this)" class="status-choice p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase">Done</button>
                </div>
                <textarea id="projSolution" placeholder="Logic payload..." rows="5" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-sm text-white"></textarea>
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="toggleModal(false)" class="flex-1 border border-white/10 text-slate-400 font-black py-5 rounded-xl uppercase">Abort</button>
                <button onclick="saveLocal()" class="flex-[2] bg-[#00ff88] text-black font-black py-5 rounded-xl uppercase shadow-lg">Save Registry</button>
            </div>
        </div>
    </div>

    <script>
        // UI & LOCAL STORAGE LOGIC (No Firebase Needed)
        let projects = JSON.parse(localStorage.getItem('pyro_ui_test')) || [];
        let currentStatus = 'Active';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('opacity-0');
            document.getElementById('sidebarOverlay').classList.toggle('pointer-events-none');
        }

        function toggleModal(s) { document.getElementById('addModal').classList.toggle('hidden', !s); }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark');
            body.classList.toggle('light');
            document.getElementById('theme-btn').innerText = body.classList.contains('dark') ? '☀️' : '🌙';
        }

        function setStatus(s, btn) {
            currentStatus = s;
            document.querySelectorAll('.status-choice').forEach(b => b.classList.replace('border-[#00ff88]', 'border-white/10'));
            btn.classList.replace('border-white/10', 'border-[#00ff88]');
        }

        function quickLoad(t, s) {
            document.getElementById('projTitle').value = t;
            document.getElementById('projSolution').value = s;
            toggleSidebar();
            toggleModal(true);
        }

        function saveLocal() {
            const title = document.getElementById('projTitle').value;
            const solution = document.getElementById('projSolution').value;
            if(title && solution) {
                projects.unshift({ title, solution, status: currentStatus, date: new Date().getTime() });
                localStorage.setItem('pyro_ui_test', JSON.stringify(projects));
                render();
                toggleModal(false);
                document.getElementById('projTitle').value = '';
                document.getElementById('projSolution').value = '';
            }
        }

        function render() {
            const container = document.getElementById('projectContainer');
            container.innerHTML = projects.map((p, i) => `
                <div class="project-card glass-panel p-8 rounded-[1.5rem]">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[8px] font-black px-2 py-1 rounded status-${p.status.toLowerCase()}">● ${p.status}</span>
                        <button onclick="deleteLocal(${i})" class="text-slate-600 hover:text-red-500">&times;</button>
                    </div>
                    <h3 class="text-xl font-black uppercase mb-4">${p.title}</h3>
                    <div class="bg-black/20 p-4 rounded-xl font-mono text-xs text-slate-400">${p.solution}</div>
                </div>`).join('');
        }

        function deleteLocal(i) {
            projects.splice(i, 1);
            localStorage.setItem('pyro_ui_test', JSON.stringify(projects));
            render();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        render();
    </script>
</body>
</html>
