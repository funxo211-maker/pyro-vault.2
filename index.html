<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyro | System OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --primary: #00ff88; --bg-dark: #030403; --bg-light: #fcfcfc; }
        
        /* THEME TRANSITIONS */
        .dark { background-color: var(--bg-dark); color: #f8fafc; }
        .light { background-color: var(--bg-light); color: #0f172a; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1); min-height: 100vh; }

        /* UNIVERSAL BRIGHT WATERMARK */
        .bg-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22vw; font-weight: 900; letter-spacing: -0.06em;
            pointer-events: none; z-index: 0; text-transform: uppercase;
            background: linear-gradient(180deg, #00ff88 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.3));
            animation: pulse-glow 8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* GLASSMORPHISM */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        .light .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .project-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .project-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        /* STATUS LEDS */
        .status-active { color: #00e0ff; background: rgba(0, 224, 255, 0.1); border: 1px solid rgba(0, 224, 255, 0.2); }
        .status-pending { color: #ffb800; background: rgba(255, 184, 0, 0.1); border: 1px solid rgba(255, 184, 0, 0.2); }
        .status-completed { color: #00ff88; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body class="dark overflow-x-hidden">

    <div class="bg-watermark">PYRO</div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] opacity-0 pointer-events-none transition-opacity"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 glass-panel -translate-x-full transition-transform duration-500 z-[1000] p-8 flex flex-col">
        <div class="flex items-center justify-between mb-12">
            <h2 class="font-bold tracking-tighter text-xl text-[#00ff88]">SYSTEM_OS</h2>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white">&times;</button>
        </div>
        <div class="space-y-2 flex-grow">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-widest mb-4">Registry Management</p>
            <button onclick="toggleSidebar()" class="w-full text-left p-3 rounded-xl hover:bg-emerald-500/10 text-sm transition-all">All Modules</button>
            <button onclick="toggleSidebar()" class="w-full text-left p-3 rounded-xl hover:bg-emerald-500/10 text-sm transition-all text-[#00e0ff]">Active Priority</button>
        </div>
        <div id="sideCount" class="text-3xl font-black text-[#00ff88] mt-auto">0</div>
        <p class="text-[8px] text-slate-500 uppercase font-black tracking-widest">Global Files Sync</p>
    </aside>

    <nav class="sticky top-0 z-50 p-6">
        <div class="max-w-7xl mx-auto glass-panel rounded-2xl p-4 px-8 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <button onclick="toggleSidebar()" class="group space-y-1.5 p-2">
                    <div class="w-6 h-0.5 bg-[#00ff88] transition-all group-hover:w-8"></div>
                    <div class="w-8 h-0.5 bg-slate-400"></div>
                </button>
                <h1 class="text-2xl font-black tracking-tighter italic text-[#00ff88]">PYRO</h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-emerald-500/10 hover:bg-emerald-500/20 transition-all text-xl">
                    <span id="theme-icon">☀️</span>
                </button>
                
                <button onclick="toggleModal(true)" class="bg-[#00ff88] text-black px-6 py-2.5 rounded-xl font-extrabold text-[11px] uppercase tracking-widest shadow-lg transform active:scale-95 transition-all">
                    Initialize
                </button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto p-8 pt-12">
        <header class="mb-16 flex justify-between items-end">
            <div>
                <p class="text-[10px] uppercase font-black tracking-[0.4em] text-[#00ff88] mb-2">Registry Lifecycle Active</p>
                <h2 class="text-6xl font-black tracking-tighter">Workspace.</h2>
            </div>
            <div class="text-right font-mono hidden md:block">
                <p id="clock" class="text-4xl font-black text-emerald-500">00:00:00</p>
                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Real-time Clock</p>
            </div>
        </header>
        <div id="projectContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20"></div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 z-[2000]">
        <div class="glass-panel w-full max-w-xl p-10 rounded-[2.5rem]">
            <h2 class="text-3xl font-black tracking-tighter mb-8 text-white">Initialize Registry</h2>
            <div class="space-y-6">
                <input id="projTitle" type="text" placeholder="Entry Identifier" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-[#00ff88] text-white">
                
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-black text-slate-500">Assignment Status</label>
                    <div id="statusPicker" class="grid grid-cols-3 gap-3">
                        <button onclick="setStatus('Active', this)" class="p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase transition-all bg-white/5 border-[#00ff88]" data-val="Active">Active</button>
                        <button onclick="setStatus('Pending', this)" class="p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase transition-all" data-val="Pending">Pending</button>
                        <button onclick="setStatus('Completed', this)" class="p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase transition-all" data-val="Completed">Completed</button>
                    </div>
                </div>

                <textarea id="projSolution" placeholder="Input system logic strings..." rows="5" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-mono text-sm outline-none focus:border-[#00ff88] text-white"></textarea>
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="toggleModal(false)" class="flex-1 border border-white/10 text-slate-400 font-black py-5 rounded-xl uppercase tracking-widest hover:bg-white/5 transition-all">
                    Abort
                </button>
                <button onclick="window.saveProject()" class="flex-[2] bg-[#00ff88] text-black font-black py-5 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(0,255,136,0.3)] hover:scale-[1.02] transition-all">
                    Sync to Cloud
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // FIREBASE SETUP
        const firebaseConfig = { apiKey: "API", authDomain: "DOMAIN", projectId: "ID", storageBucket: "BUCKET", messagingSenderId: "SENDER", appId: "APP" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const projectsRef = collection(db, "projects");

        let selectedStatus = 'Active';

        // THEME LOGIC
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('light', !isDark);
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        };

        window.setStatus = (s, btn) => {
            selectedStatus = s;
            document.querySelectorAll('#statusPicker button').forEach(b => b.classList.remove('bg-white/10', 'border-[#00ff88]'));
            btn.classList.add('bg-white/10', 'border-[#00ff88]');
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('opacity-0');
            document.getElementById('sidebarOverlay').classList.toggle('pointer-events-none');
        };
        window.toggleModal = (s) => document.getElementById('addModal').classList.toggle('hidden', !s);
        
        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return "Just now";
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false }); 
        }, 1000);

        onSnapshot(query(projectsRef, orderBy("date", "desc")), (snap) => {
            const projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('sideCount').innerText = projects.length;
            render(projects);
        });

        function render(items) {
            const container = document.getElementById('projectContainer');
            container.innerHTML = items.map(p => `
                <div class="project-card glass-panel p-8 rounded-[1.5rem] flex flex-col h-full">
                    <div class="flex justify-between items-start mb-6">
                        <div class="space-y-2">
                            <span class="text-[8px] font-black px-2 py-1 rounded status-${p.status.toLowerCase()} uppercase tracking-widest">● ${p.status}</span>
                            <h3 class="text-xl font-black tracking-tight uppercase dark:text-white text-slate-900">${p.title}</h3>
                        </div>
                        <button onclick="window.deleteItem('${p.id}')" class="text-slate-700 hover:text-red-500 transition-colors">&times;</button>
                    </div>
                    <div class="bg-black/10 dark:bg-black/40 border border-emerald-500/5 p-5 rounded-xl font-mono text-[11px] dark:text-slate-400 text-slate-600 flex-grow mb-4">
                        ${p.solution}
                    </div>
                    <div class="flex items-center justify-between border-t border-emerald-500/10 pt-4">
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Temporal Log</p>
                        <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">${timeSince(p.date)}</p>
                    </div>
                </div>`).join('');
        }

        window.saveProject = async () => {
            const title = document.getElementById('projTitle').value;
            const solution = document.getElementById('projSolution').value;
            if(title && solution) {
                await addDoc(projectsRef, { title, solution, status: selectedStatus, date: new Date().getTime() });
                toggleModal(false);
                document.getElementById('projTitle').value = '';
                document.getElementById('projSolution').value = '';
            }
        };

        window.deleteItem = async (id) => { if(confirm("Incinerate record?")) await deleteDoc(doc(db, "projects", id)); };
    </script>
</body>
</html>
